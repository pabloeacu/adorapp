<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdorAPP - Preview Login CAF</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #000; min-height: 100vh; }
    .container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1rem; }
    .card { width: 100%; max-width: 28rem; }
    .header { text-align: center; margin-bottom: 2rem; }
    .logo { width: 12rem; height: 8rem; object-fit: contain; margin: 0 auto 1rem; }
    .subtitle { color: #6b7280; font-size: 0.875rem; }
    .login-box { background: #171717; border: 1px solid #262626; border-radius: 1rem; padding: 2rem; }
    .login-title { font-size: 1.25rem; font-weight: 600; text-align: center; margin-bottom: 1.5rem; color: #fff; }
    .form-group { margin-bottom: 1rem; }
    .input-wrapper { position: relative; }
    .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #6b7280; }
    .input { width: 100%; padding: 0.75rem 1rem 0.75rem 3rem; background: #262626; border: 1px solid #404040; border-radius: 0.75rem; color: #fff; font-size: 1rem; transition: border-color 0.2s; }
    .input::placeholder { color: #6b7280; }
    .input:focus { outline: none; border-color: #fff; }
    .remember-row { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0; }
    .remember-label { display: flex; align-items: center; gap: 0.75rem; cursor: pointer; }
    .toggle { width: 44px; height: 24px; background: #fff; border-radius: 9999px; position: relative; }
    .toggle::after { content: ''; position: absolute; width: 20px; height: 20px; background: #000; border-radius: 9999px; top: 2px; right: 2px; }
    .remember-text { color: #9ca3af; font-size: 0.875rem; }
    .btn-primary { width: 100%; padding: 0.75rem; background: #fff; color: #000; font-weight: 600; border: none; border-radius: 0.75rem; cursor: pointer; transition: background 0.2s; }
    .btn-primary:hover { background: #e5e5e5; }
    .divider { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #262626; }
    .hint { text-align: center; color: #6b7280; font-size: 0.75rem; }
    .btn-secondary { width: 100%; padding: 0.75rem; background: transparent; color: #d1d5db; font-weight: 500; border: 1px solid #404040; border-radius: 0.75rem; cursor: pointer; margin-top: 1rem; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn-secondary:hover { background: #262626; border-color: #525252; }
    .footer { text-align: center; margin-top: 1.5rem; color: #525252; font-size: 0.75rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <!-- Header con logo CAF -->
      <div class="header">
        <img src="https://agent-space.minimax.io/workspace/adorapp/public/logo-caf.png" alt="CAF Logo" class="logo">
        <p class="subtitle">Centro de Avivamiento Familiar</p>
      </div>

      <!-- Login Card -->
      <div class="login-box">
        <h2 class="login-title">Iniciar Sesión</h2>

        <div class="form-group">
          <div class="input-wrapper">
            <span class="input-icon">✉</span>
            <input type="email" class="input" placeholder="Email">
          </div>
        </div>

        <div class="form-group">
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" class="input" placeholder="Contraseña">
          </div>
        </div>

        <div class="remember-row">
          <label class="remember-label">
            <div class="toggle"></div>
            <span class="remember-text">Recordar mi email</span>
          </label>
        </div>

        <button class="btn-primary">Entrar</button>

        <div class="divider">
          <p class="hint">Usa las credenciales que te proporcionaron tus pastores</p>
        </div>

        <button class="btn-secondary">
          <span>+</span> Quiero registrarme
        </button>
      </div>

      <p class="footer">© 2026 Centro de Avivamiento Familiar</p>
    </div>
  </div>
</body>
</html>
