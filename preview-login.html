<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdorAPP - Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .min-h-screen { min-height: 100vh; }
    .bg-black { background-color: #000; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-center { justify-content: center; }
    .p-4 { padding: 1rem; }
    .w-full { width: 100%; }
    .max-w-md { max-width: 28rem; margin: 0 auto; }
    .mb-8 { margin-bottom: 2rem; }
    .text-center { text-align: center; }
    .mx-auto { margin-left: auto; margin-right: auto; }
    .mb-4 { margin-bottom: 1rem; }
    .mt-2 { margin-top: 0.5rem; }
    .text-gray-500 { color: #6b7280; }
    .bg-neutral-900 { background-color: #171717; }
    .border { border-width: 1px; }
    .border-neutral-800 { border-color: #262626; }
    .rounded-2xl { border-radius: 1rem; }
    .p-8 { padding: 2rem; }
    .bg-neutral-800 { background-color: #262626; }
    .border-neutral-700 { border-color: #404040; }
    .rounded-xl { border-radius: 0.75rem; }
    .text-white { color: #fff; }
    .placeholder-gray-500::placeholder { color: #6b7280; }
    .w-48 { width: 12rem; }
    .h-32 { height: 8rem; }
    .object-contain { object-fit: contain; }
    .text-xl { font-size: 1.25rem; }
    .font-semibold { font-weight: 600; }
    .mb-6 { margin-bottom: 1.5rem; }
    .space-y-4 > * + * { margin-top: 1rem; }
    .relative { position: relative; }
    .absolute { position: absolute; }
    .left-4 { left: 1rem; }
    .top-1\/2 { top: 50%; }
    .-translate-y-1\/2 { transform: translateY(-50%); }
    .text-gray-500 { color: #6b7280; }
    .pl-12 { padding-left: 3rem; }
    .pr-4 { padding-right: 1rem; }
    .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
    .w-full { width: 100%; }
    .text-sm { font-size: 0.875rem; }
    .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
    .mt-6 { margin-top: 1.5rem; }
    .pt-6 { padding-top: 1.5rem; }
    .border-t { border-top-width: 1px; }
    .border-neutral-800 { border-color: #262626; }
    .text-xs { font-size: 0.75rem; }
    .text-gray-400 { color: #9ca3af; }
    input { outline: none; }
    input:focus { border-color: #fff; }
    .mt-4 { margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="min-h-screen bg-black flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <!-- Header con logo CAF -->
      <div class="text-center mb-8">
        <img
          src="logo-caf.png"
          alt="CAF Logo"
          class="w-48 h-32 mx-auto mb-4 object-contain"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='block'"
        >
        <div style="display:none; background: #333; width: 12rem; height: 8rem; margin: 0 auto 1rem; border-radius: 0.5rem; line-height: 8rem; color: #fff; font-size: 0.75rem;">
          [Logo CAF]
        </div>
        <p class="text-gray-500 mt-2">Centro de Avivamiento Familiar</p>
      </div>

      <!-- Login Card -->
      <div class="bg-neutral-900 border border-neutral-800 rounded-2xl p-8">
        <h2 class="text-xl font-semibold mb-6 text-center">Iniciar Sesión</h2>

        <div class="space-y-4">
          <!-- Email Input -->
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">✉</span>
            <input
              type="email"
              placeholder="Email"
              class="w-full pl-12 pr-4 py-3 bg-neutral-800 border border-neutral-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-white transition-colors"
            >
          </div>

          <!-- Password Input -->
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">🔒</span>
            <input
              type="password"
              placeholder="Contraseña"
              class="w-full pl-12 pr-4 py-3 bg-neutral-800 border border-neutral-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-white transition-colors"
            >
          </div>

          <!-- Remember Me -->
          <div class="flex items-center justify-between py-2">
            <label class="flex items-center gap-3 cursor-pointer">
              <div style="width: 44px; height: 24px; background: #fff; border-radius: 9999px; position: relative;">
                <div style="width: 20px; height: 20px; background: #000; border-radius: 9999px; position: absolute; top: 2px; right: 2px;"></div>
              </div>
              <span class="text-sm text-gray-400">Recordar mi email</span>
            </label>
          </div>

          <!-- Submit Button -->
          <button class="w-full py-3 bg-white text-black font-semibold rounded-xl hover:bg-gray-200 transition-all">
            Entrar
          </button>
        </div>

        <div class="mt-6 pt-6 border-t border-neutral-800">
          <p class="text-xs text-gray-500 text-center">
            Usa las credenciales que te proporcionaron tus pastores
          </p>
        </div>

        <!-- Register Button -->
        <div class="mt-4">
          <button class="w-full py-3 border border-neutral-700 text-gray-300 font-medium rounded-xl hover:bg-neutral-800 hover:border-neutral-600 transition-all flex items-center justify-center gap-2">
            <span>+</span> Quiero registrarme
          </button>
        </div>
      </div>

      <p class="text-xs text-gray-600 text-center mt-6">
        © 2026 Centro de Avivamiento Familiar
      </p>
    </div>
  </div>
</body>
</html>
